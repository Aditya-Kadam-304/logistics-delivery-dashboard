name: Daily Weather Pull

# Runs automatically every day at 06:00 UTC, and can also be triggered
# manually from the Actions tab for testing.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weather pull script
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python scripts/02_weather_pull.py

      - name: Commit updated weather log
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/weather_log.csv
          git diff --staged --quiet || git commit -m "Automated daily weather pull"
          git push
